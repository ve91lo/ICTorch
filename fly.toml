# fly.toml app configuration file generated for your-ict-rag on 2026-03-25T23:36:33+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'your-ict-rag'
primary_region = 'sin'

[http_service]
  internal_port = 8000
  force_https = true

  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "60s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = '2gb'
  cpus = 2